<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reroll Sessions Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="app-header">
        <h1>🎲 Reroll Sessions Viewer</h1>
        <div class="header-actions">
            <button class="btn btn-sm" id="exitPickupBtn" style="display:none" onclick="exitPickupMode()"
                data-i18n="pickupExitBtn">✕ Exit Pickup</button>
            <button class="btn btn-sm" id="clearHighlights" style="display:none" onclick="clearAllHighlights()"
                data-i18n="clearHighlights">✕ Clear Highlights</button>
            <div class="lang-switcher" id="langSwitcher"></div>
            <div class="file-input-wrapper">
                <label class="btn btn-primary" for="fileInput" data-i18n="loadJson">📂 Load JSON File</label>
                <input type="file" id="fileInput" accept=".json">
            </div>
        </div>
    </header>

    <!-- Floating Pickup Button -->
    <button id="pickupBtn" onclick="showPickupModal()" title="Pickup">🎯<span class="pickup-badge"
            id="pickupBadge"></span></button>

    <div id="landing" class="landing">
        <div class="landing-icon">📋</div>
        <p data-i18n="landingMsg">Load <code>reroll_sessions.json</code> to get started</p>
        <label class="btn btn-primary" for="fileInput" style="font-size:1rem;padding:12px 28px;"
            data-i18n="selectFile">Select File</label>
        <p style="color:var(--text-muted);font-size:0.85rem;margin-top:-8px" data-i18n="landingDragHint">or drag & drop
            here</p>
    </div>

    <div class="drop-overlay" id="dropOverlay">
        <div class="drop-zone">
            <div class="drop-zone-icon">📁</div>
            <div class="drop-zone-text" data-i18n="dropOverlay">Drop JSON file here</div>
        </div>
    </div>

    <div id="app" style="display:none">
        <div class="info-updated" id="infoUpdated"></div>
        <div class="global-filter-bar" id="globalFilterBar" style="display:none">
            <span class="global-filter-label" id="globalFilterLabel"></span>
            <div class="global-filter-mode" id="globalFilterModeButtons"></div>
            <div class="global-filter-controls" id="globalFilterControls"></div>
            <button class="btn btn-sm" onclick="resetGlobalFilter()"></button>
        </div>
        <div class="tabs" id="tabsContainer"></div>
        <div class="content" id="panelsContainer"></div>
    </div>

    <!-- Pickup mode selector modal -->
    <div class="pickup-modal-overlay" id="pickupModalOverlay" onclick="hidePickupModal()">
        <div class="pickup-modal" onclick="event.stopPropagation()">
            <h3 data-i18n="pickupSelectMode">Select Mode</h3>
            <div class="pickup-modal-btns">
                <button class="btn btn-primary" onclick="enterPickupMode('lottery')"
                    data-i18n="pickupLottery">Lottery</button>
                <button class="btn btn-primary" onclick="enterPickupMode('grinding')"
                    data-i18n="pickupGrinding">Grinding</button>
            </div>
        </div>
    </div>

    <!-- Pickup summary panel -->
    <div class="pickup-panel" id="pickupPanel">
        <div class="pickup-panel-header">
            <h3 id="pickupPanelTitle">🎯 Pickup List</h3>
            <div class="pickup-panel-actions">
                <button class="btn btn-sm" onclick="clearAllPicks()" data-i18n="pickupClearAll">Clear All</button>
                <button class="btn btn-sm" onclick="exitPickupMode()">✕</button>
            </div>
        </div>
        <div class="pickup-panel-body" id="pickupPanelBody"></div>
        <div class="pickup-panel-footer" id="pickupPanelFooter"></div>
    </div>

    <script>
        // ── i18n System ──
        // To add a new language: add a new key (e.g. 'ko', 'zh') to I18N with all the same keys.
        const I18N = {
            en: {
                // Header & buttons
                loadJson: '📂 Load JSON File',
                clearHighlights: '✕ Clear Highlights',
                selectFile: 'Select File',
                landingMsg: 'Load <code>reroll_sessions.json</code> to get started',
                landingDragHint: 'or drag & drop here',
                dropOverlay: 'Drop JSON file here',
                // Info bar
                lastUpdated: 'Last Updated',
                weaponCount: 'Weapons',
                // Panel meta
                weaponType: 'Weapon',
                attribute: 'Attribute',
                mode: 'Mode',
                attempts: 'Attempts',
                // Filters
                groupSkill: 'Group Skill',
                seriesSkill: 'Series Skill',
                filterAll: 'All',
                filterReset: 'Reset',
                // Table
                colNum: '#',
                colGroup: 'Group Skill',
                colSeries: 'Series Skill',
                // Grinding columns
                colBonus1: 'Bonus 1',
                colBonus2: 'Bonus 2',
                colBonus3: 'Bonus 3',
                colBonus4: 'Bonus 4',
                colBonus5: 'Bonus 5',
                bonusFilter: 'Bonus',
                statsUniqueBonuses: 'Unique Bonuses',
                // Legend
                legendTitle: 'Highlighted',
                legendHint: 'Click a skill to highlight',
                // Stats
                statsShown: 'Shown',
                statsUniqueGroup: 'Unique Groups',
                statsUniqueSeries: 'Unique Series',
                // Pickup
                pickupBtn: '🎯 Pickup',
                pickupSelectMode: 'Select Mode',
                pickupLottery: 'Skill',
                pickupGrinding: 'Bonus',
                pickupTitle: '🎯 Pickup List',
                pickupClearAll: 'Clear All',
                pickupTotal: 'Total picks',
                pickupConsumed: 'Attempts consumed',
                pickupConflict: 'Used by another weapon',
                pickupExitBtn: '✕ Exit Pickup',
                pickupEmpty: 'Click a row to pick it',
                pickupClearConfirm: 'Are you sure you want to clear all picks?',
                // Global Filter
                globalFilter: '🔍 Global Filter',
                globalFilterBonus: 'Bonus',
                globalFilterCategory: 'Category',
                globalFilterExact: 'Exact',
                // Errors
                jsonParseError: 'Failed to parse JSON: ',
            },
            ja: {
                loadJson: '📂 JSONファイルを読み込む',
                clearHighlights: '✕ ハイライト全解除',
                selectFile: 'ファイルを選択',
                landingMsg: '<code>reroll_sessions.json</code> を読み込んでください',
                landingDragHint: 'またはドラッグ＆ドロップ',
                dropOverlay: 'JSONファイルをここにドロップ',
                lastUpdated: '最終更新',
                weaponCount: '武器数',
                weaponType: '武器種',
                attribute: '属性',
                mode: 'モード',
                attempts: '試行回数',
                groupSkill: 'グループスキル',
                seriesSkill: 'シリーズスキル',
                filterAll: 'すべて',
                filterReset: 'リセット',
                colNum: '#',
                colGroup: 'グループスキル',
                colSeries: 'シリーズスキル',
                colBonus1: 'ボーナス1',
                colBonus2: 'ボーナス2',
                colBonus3: 'ボーナス3',
                colBonus4: 'ボーナス4',
                colBonus5: 'ボーナス5',
                bonusFilter: 'ボーナス',
                statsUniqueBonuses: 'ユニークボーナス',
                legendTitle: 'ハイライト中',
                legendHint: 'スキルをクリックしてハイライト',
                statsShown: '表示',
                statsUniqueGroup: 'ユニークグループ',
                statsUniqueSeries: 'ユニークシリーズ',
                pickupBtn: '🎯 ピックアップ',
                pickupSelectMode: 'モード選択',
                pickupLottery: 'スキル',
                pickupGrinding: 'ボーナス',
                pickupTitle: '🎯 ピックアップリスト',
                pickupClearAll: '全解除',
                pickupTotal: '選択数',
                pickupConsumed: '消費試行回数',
                pickupConflict: '他の武器で使用中',
                pickupExitBtn: '✕ ピックアップ終了',
                pickupEmpty: '行をクリックして選択',
                pickupClearConfirm: 'すべてのピックをクリアしますか？',
                globalFilter: '🔍 グローバルフィルター',
                globalFilterBonus: 'ボーナス',
                globalFilterCategory: 'カテゴリ',
                globalFilterExact: '完全一致',
                jsonParseError: 'JSONの解析に失敗しました: ',
            },
        };

        let currentLang = 'en';

        /** Get translated string */
        function t(key) {
            return (I18N[currentLang] && I18N[currentLang][key]) || I18N.en[key] || key;
        }

        /** Apply translations to static [data-i18n] elements */
        function applyStaticI18n() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                const val = t(key);
                if (val.includes('<')) {
                    el.innerHTML = val;
                } else {
                    el.textContent = val;
                }
            });
            document.documentElement.lang = currentLang;
        }

        /** Build language switcher dropdown */
        function buildLangSwitcher() {
            const container = document.getElementById('langSwitcher');
            container.innerHTML = '';
            const langs = Object.keys(I18N);
            const labels = { en: 'EN', ja: 'JA' }; // display labels per language
            const select = document.createElement('select');
            langs.forEach(lang => {
                const opt = document.createElement('option');
                opt.value = lang;
                opt.textContent = labels[lang] || lang.toUpperCase();
                if (lang === currentLang) opt.selected = true;
                select.appendChild(opt);
            });
            select.onchange = () => setLang(select.value);
            container.appendChild(select);
        }

        /** Switch language and re-render */
        function setLang(lang) {
            if (!I18N[lang]) return;
            currentLang = lang;
            applyStaticI18n();
            buildLangSwitcher();
            if (sessionData) {
                // Re-render dynamic content
                updateInfoBar();
                buildGlobalFilterBar();
                buildPanels();
                const activeIdx = [...document.querySelectorAll('.tab')].findIndex(t => t.classList.contains('active'));
                switchTab(activeIdx >= 0 ? activeIdx : 0);
                applyAllHighlights();
            }
        }

        // Initialize language on load
        buildLangSwitcher();
        applyStaticI18n();

        // ── Color palette for skill auto-coloring ──
        const SKILL_COLORS = [
            { bg: '#2d1f3d', text: '#c084fc' },  // purple
            { bg: '#1f2d3d', text: '#60a5fa' },  // blue
            { bg: '#1f3d2d', text: '#34d399' },  // green
            { bg: '#3d2d1f', text: '#fbbf24' },  // amber
            { bg: '#3d1f2d', text: '#fb7185' },  // rose
            { bg: '#1f3d3d', text: '#22d3ee' },  // cyan
            { bg: '#3d3d1f', text: '#a3e635' },  // lime
            { bg: '#2d1f2d', text: '#e879f9' },  // fuchsia
            { bg: '#1f2d2d', text: '#2dd4bf' },  // teal
            { bg: '#3d2d2d', text: '#f97316' },  // orange
            { bg: '#2d2d1f', text: '#facc15' },  // yellow
            { bg: '#1f1f3d', text: '#818cf8' },  // indigo
            { bg: '#2d3d1f', text: '#84cc16' },  // lime2
            { bg: '#3d1f1f', text: '#f87171' },  // red
            { bg: '#1f3d1f', text: '#4ade80' },  // green2
            { bg: '#2d1f1f', text: '#fb923c' },  // orange2
            { bg: '#1f2d1f', text: '#a78bfa' },  // violet
            { bg: '#3d3d2d', text: '#fde047' },  // yellow2
            { bg: '#2d3d3d', text: '#67e8f9' },  // sky
            { bg: '#3d2d3d', text: '#f472b6' },  // pink
            { bg: '#253545', text: '#7dd3fc' },  // lightblue
            { bg: '#352535', text: '#d946ef' },  // magenta
            { bg: '#354525', text: '#bef264' },  // chartreuse
            { bg: '#452535', text: '#fda4af' },  // salmon
        ];

        let sessionData = null;
        let skillColorMap = {};
        let highlightedSkills = new Set();
        let colorIndex = 0;

        // ── Load file (shared) ──
        function loadFile(file) {
            if (!file || !file.name.endsWith('.json')) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    sessionData = JSON.parse(ev.target.result);
                    initViewer();
                } catch (err) {
                    alert(t('jsonParseError') + err.message);
                }
            };
            reader.readAsText(file, 'utf-8');
        }

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) loadFile(file);
        });

        // ── Drag & Drop ──
        let dragCounter = 0;
        const dropOverlay = document.getElementById('dropOverlay');

        document.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            dropOverlay.classList.add('active');
        });

        document.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dragCounter--;
            if (dragCounter <= 0) {
                dragCounter = 0;
                dropOverlay.classList.remove('active');
            }
        });

        document.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        document.addEventListener('drop', (e) => {
            e.preventDefault();
            dragCounter = 0;
            dropOverlay.classList.remove('active');
            const file = e.dataTransfer.files[0];
            if (file) loadFile(file);
        });

        function getSkillColor(skillName) {
            if (!skillColorMap[skillName]) {
                skillColorMap[skillName] = SKILL_COLORS[colorIndex % SKILL_COLORS.length];
                colorIndex++;
            }
            return skillColorMap[skillName];
        }

        function initViewer() {
            document.getElementById('landing').style.display = 'none';
            document.getElementById('app').style.display = 'block';

            document.getElementById('clearHighlights').style.display = '';
            document.getElementById('pickupBtn').style.display = 'flex';

            // Reset
            skillColorMap = {};
            colorIndex = 0;
            highlightedSkills.clear();
            // Fully reset pickup state on new file load
            if (pickupMode) exitPickupMode();
            pickedAttempts = [];
            usedAttemptNums.clear();
            pickupModeType = null;
            updatePickupBadge();

            // First pass: assign colors consistently
            const allGroupSkills = new Set();
            const allSeriesSkills = new Set();
            const allBonuses = new Set();
            sessionData.weapons.forEach(w => {
                if (w.mode === 'grinding') {
                    w.attempts.forEach(a => {
                        (a.bonuses || []).forEach(b => allBonuses.add(b));
                    });
                } else {
                    w.attempts.forEach(a => {
                        if (a.skills) {
                            allGroupSkills.add(a.skills.group);
                            allSeriesSkills.add(a.skills.series);
                        }
                    });
                }
            });
            // Assign colors to group skills first, then series, then bonuses
            [...allGroupSkills].sort().forEach(s => getSkillColor(s));
            [...allSeriesSkills].sort().forEach(s => getSkillColor(s));
            [...allBonuses].sort().forEach(b => getSkillColor(b));

            updateInfoBar();
            buildGlobalFilterBar();
            buildTabs();
            buildPanels();
            switchTab(0);
        }

        function updateInfoBar() {
            const infoEl = document.getElementById('infoUpdated');
            const count = sessionData.totalWeapons || sessionData.weapons.length;
            infoEl.textContent = sessionData.lastUpdated
                ? `${t('lastUpdated')}: ${sessionData.lastUpdated}  ·  ${t('weaponCount')}: ${count}`
                : `${t('weaponCount')}: ${count}`;
        }

        function buildTabs() {
            const container = document.getElementById('tabsContainer');
            container.innerHTML = '';
            sessionData.weapons.forEach((w, i) => {
                const tab = document.createElement('button');
                tab.className = 'tab';
                tab.textContent = w.nickname || `${w.weaponTypeName} ${w.attribute}`;
                tab.onclick = () => switchTab(i);
                tab.dataset.index = i;
                tab.dataset.mode = w.mode;
                // if (w.isCurrent) tab.textContent += ' ⚡';
                container.appendChild(tab);
            });
        }

        function buildPanels() {
            const container = document.getElementById('panelsContainer');
            container.innerHTML = '';
            sessionData.weapons.forEach((w, i) => {
                const panel = document.createElement('div');
                panel.className = 'weapon-panel';
                panel.id = `panel-${i}`;
                panel.innerHTML = buildPanelHTML(w, i);
                container.appendChild(panel);
            });
        }

        function buildPanelHTML(weapon, wIdx) {
            const isGrinding = weapon.mode === 'grinding';

            // ── Meta info (shared) ──
            let html = `
    <div class="panel-header">
      <div class="meta-info">
        <div class="meta-badge">
          <span class="label">${t('weaponType')}</span>
          <span class="value">${weapon.weaponTypeName}</span>
        </div>
        <div class="meta-badge">
          <span class="label">${t('attribute')}</span>
          <span class="value">${weapon.attribute}</span>
        </div>
        <div class="meta-badge">
          <span class="label">${t('mode')}</span>
          <span class="value">${weapon.mode}</span>
        </div>
        <div class="meta-badge">
          <span class="label">${t('attempts')}</span>
          <span class="value">${weapon.attempts.length}</span>
        </div>
      </div>
      <div class="filter-section">`;

            if (isGrinding) {
                // ── Grinding: single bonus filter ──
                const allBonuses = [...new Set(weapon.attempts.flatMap(a => a.bonuses || []))].sort();
                html += `
        <div class="filter-group">
          <label>${t('bonusFilter')}</label>
          <select onchange="filterChanged(${wIdx})" data-type="bonus" data-widget="${wIdx}">
            <option value="">${t('filterAll')}</option>
            ${allBonuses.map(b => `<option value="${escHtml(b)}">${escHtml(b)}</option>`).join('')}
          </select>
        </div>`;
            } else {
                // ── Lottery: group + series filters ──
                const groupSkills = [...new Set(weapon.attempts.map(a => a.skills.group))].sort();
                const seriesSkills = [...new Set(weapon.attempts.map(a => a.skills.series))].sort();
                html += `
        <div class="filter-group">
          <label>${t('groupSkill')}</label>
          <select onchange="filterChanged(${wIdx})" data-type="group" data-widget="${wIdx}">
            <option value="">${t('filterAll')}</option>
            ${groupSkills.map(s => `<option value="${escHtml(s)}">${escHtml(s)}</option>`).join('')}
          </select>
        </div>
        <div class="filter-group">
          <label>${t('seriesSkill')}</label>
          <select onchange="filterChanged(${wIdx})" data-type="series" data-widget="${wIdx}">
            <option value="">${t('filterAll')}</option>
            ${seriesSkills.map(s => `<option value="${escHtml(s)}">${escHtml(s)}</option>`).join('')}
          </select>
        </div>`;
            }

            html += `
        <button class="btn btn-sm" onclick="resetFilters(${wIdx})">${t('filterReset')}</button>
      </div>
    </div>
    <div class="table-wrapper">`;

            if (isGrinding) {
                // ── Grinding table: 5 bonus columns ──
                html += `
      <table class="grinding-table">
        <thead>
          <tr><th>${t('colNum')}</th><th>${t('colBonus1')}</th><th>${t('colBonus2')}</th><th>${t('colBonus3')}</th><th>${t('colBonus4')}</th><th>${t('colBonus5')}</th></tr>
        </thead>
        <tbody id="tbody-${wIdx}">`;

                weapon.attempts.forEach((a) => {
                    const bonuses = a.bonuses || [];
                    const bonusesAttr = bonuses.map(b => escAttr(b)).join('|');
                    html += `
          <tr data-bonuses="${bonusesAttr}" data-attempt="${a.attemptNum}" data-widx="${wIdx}" onclick="onRowClick(this)">
            <td>${a.attemptNum}</td>`;
                    for (let i = 0; i < 5; i++) {
                        const b = bonuses[i] || '';
                        if (b) {
                            const bc = getSkillColor(b);
                            html += `
            <td><span class="skill-cell" data-skill="${escAttr(b)}"
                  style="background:${bc.bg};color:${bc.text}"
                  onclick="toggleHighlight(this)">${escHtml(b)}</span></td>`;
                        } else {
                            html += `<td></td>`;
                        }
                    }
                    html += `
          </tr>`;
                });
            } else {
                // ── Lottery table: group + series columns ──
                html += `
      <table>
        <thead>
          <tr><th>${t('colNum')}</th><th>${t('colGroup')}</th><th>${t('colSeries')}</th></tr>
        </thead>
        <tbody id="tbody-${wIdx}">`;

                weapon.attempts.forEach((a) => {
                    const gc = getSkillColor(a.skills.group);
                    const sc = getSkillColor(a.skills.series);
                    html += `
          <tr data-group="${escAttr(a.skills.group)}" data-series="${escAttr(a.skills.series)}" data-attempt="${a.attemptNum}" data-widx="${wIdx}" onclick="onRowClick(this)">
            <td>${a.attemptNum}</td>
            <td><span class="skill-cell" data-skill="${escAttr(a.skills.group)}"
                  style="background:${gc.bg};color:${gc.text}"
                  onclick="toggleHighlight(this)">${escHtml(a.skills.group)}</span></td>
            <td><span class="skill-cell" data-skill="${escAttr(a.skills.series)}"
                  style="background:${sc.bg};color:${sc.text}"
                  onclick="toggleHighlight(this)">${escHtml(a.skills.series)}</span></td>
          </tr>`;
                });
            }

            html += `
        </tbody>
      </table>
    </div>
    <div class="highlight-legend" id="legend-${wIdx}">
      <span class="legend-title">${t('legendTitle')}</span>
      <span class="legend-chips" id="legend-chips-${wIdx}"></span>
    </div>
    <div class="stats-bar" id="stats-${wIdx}">
    </div>`;

            return html;
        }

        function switchTab(idx) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', i === idx);
            });
            document.querySelectorAll('.weapon-panel').forEach((p, i) => {
                p.classList.toggle('active', i === idx);
            });
            updateStats(idx);
        }

        // ── Highlight ──
        function toggleHighlight(el) {
            if (pickupMode) return; // suppress during pickup mode
            const skill = el.dataset.skill;
            if (highlightedSkills.has(skill)) {
                highlightedSkills.delete(skill);
            } else {
                highlightedSkills.add(skill);
            }
            applyAllHighlights();
        }

        function clearAllHighlights() {
            highlightedSkills.clear();
            applyAllHighlights();
        }

        function applyAllHighlights() {
            // Update skill-cell highlighted class
            document.querySelectorAll('.skill-cell').forEach(el => {
                el.classList.toggle('highlighted', highlightedSkills.has(el.dataset.skill));
            });

            // Dim/highlight rows if any skills are highlighted
            if (highlightedSkills.size > 0) {
                const highlightedArray = Array.from(highlightedSkills);

                document.querySelectorAll('tbody tr').forEach(tr => {
                    let isMatch;
                    if (tr.dataset.bonuses) {
                        // Grinding row: check pipe-delimited bonuses
                        const rowBonuses = tr.dataset.bonuses.split('|');
                        isMatch = highlightedArray.every(b => rowBonuses.includes(b));
                    } else {
                        // Lottery row: check group + series
                        const rowSkills = [tr.dataset.group, tr.dataset.series];
                        isMatch = highlightedArray.every(s => rowSkills.includes(s));
                    }
                    tr.classList.toggle('dim', !isMatch);
                    tr.classList.toggle('match', isMatch);
                });
            } else {
                document.querySelectorAll('tbody tr').forEach(tr => {
                    tr.classList.remove('dim', 'match');
                });
            }

            // Update legend chips in all panels
            sessionData.weapons.forEach((_, i) => updateLegendChips(i));
        }

        function updateLegendChips(wIdx) {
            const chipsEl = document.getElementById(`legend-chips-${wIdx}`);
            if (!chipsEl) return;
            if (highlightedSkills.size === 0) {
                chipsEl.innerHTML = `<span style="font-size:0.75rem;color:var(--text-muted)">${t('legendHint')}</span>`;
                return;
            }
            chipsEl.innerHTML = [...highlightedSkills].map(skill => {
                const c = getSkillColor(skill);
                return `<span class="legend-chip active" style="background:${c.bg};color:${c.text}"
              onclick="toggleHighlight({dataset:{skill:'${escAttr(skill)}'}})">
              ${escHtml(skill)} <span class="remove">✕</span>
            </span>`;
            }).join('');
        }

        // ── Filters ──
        function filterChanged(wIdx) {
            const bonusSelect = document.querySelector(`select[data-type="bonus"][data-widget="${wIdx}"]`);

            if (bonusSelect) {
                // Grinding mode: filter by bonus name
                const bonusFilter = bonusSelect.value;
                const tbody = document.getElementById(`tbody-${wIdx}`);
                tbody.querySelectorAll('tr').forEach(tr => {
                    const bonuses = tr.dataset.bonuses || '';
                    const match = !bonusFilter || bonuses.split('|').includes(bonusFilter);
                    tr.style.display = match ? '' : 'none';
                });
            } else {
                // Lottery mode: filter by group + series
                const groupSelect = document.querySelector(`select[data-type="group"][data-widget="${wIdx}"]`);
                const seriesSelect = document.querySelector(`select[data-type="series"][data-widget="${wIdx}"]`);
                const groupFilter = groupSelect ? groupSelect.value : '';
                const seriesFilter = seriesSelect ? seriesSelect.value : '';

                const tbody = document.getElementById(`tbody-${wIdx}`);
                tbody.querySelectorAll('tr').forEach(tr => {
                    const matchGroup = !groupFilter || tr.dataset.group === groupFilter;
                    const matchSeries = !seriesFilter || tr.dataset.series === seriesFilter;
                    tr.style.display = (matchGroup && matchSeries) ? '' : 'none';
                });
            }

            updateStats(wIdx);
        }

        function resetFilters(wIdx) {
            document.querySelectorAll(`select[data-widget="${wIdx}"]`).forEach(sel => sel.value = '');
            filterChanged(wIdx);
        }

        function updateStats(wIdx) {
            const statsEl = document.getElementById(`stats-${wIdx}`);
            if (!statsEl) return;
            const tbody = document.getElementById(`tbody-${wIdx}`);
            if (!tbody) return;

            const allRows = tbody.querySelectorAll('tr');
            const visibleRows = [...allRows].filter(r => r.style.display !== 'none');
            const total = allRows.length;
            const shown = visibleRows.length;

            // Detect grinding vs lottery from the first row's dataset
            const isGrinding = allRows.length > 0 && allRows[0].dataset.bonuses !== undefined;

            if (isGrinding) {
                const uniqueBonuses = new Set(visibleRows.flatMap(r => (r.dataset.bonuses || '').split('|')));
                statsEl.innerHTML = `
    <span class="stat">${t('statsShown')}: <span class="stat-value">${shown}</span> / ${total}</span>
    <span class="stat">${t('statsUniqueBonuses')}: <span class="stat-value">${uniqueBonuses.size}</span></span>
  `;
            } else {
                const groups = new Set(visibleRows.map(r => r.dataset.group));
                const series = new Set(visibleRows.map(r => r.dataset.series));
                statsEl.innerHTML = `
    <span class="stat">${t('statsShown')}: <span class="stat-value">${shown}</span> / ${total}</span>
    <span class="stat">${t('statsUniqueGroup')}: <span class="stat-value">${groups.size}</span></span>
    <span class="stat">${t('statsUniqueSeries')}: <span class="stat-value">${series.size}</span></span>
  `;
            }
        }


        // ── Utils ──
        function escHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function escAttr(str) {
            return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ── Global Filter System ──
        let globalFilterMode = null; // 'lottery' or 'grinding' or null
        let globalFilterAllGroups = [];
        let globalFilterAllSeries = [];
        let globalFilterAllBonuses = [];
        let globalFilterAllCategories = []; // base names (suffix-stripped)

        /** Strip suffix (Ⅰ-Ⅴ / ＥＸ / I-V / EX) to get the base bonus name */
        function getBonusBaseName(bonus) {
            return bonus
                .replace(/[\u2160-\u2164]+$/, '')        // full-width Roman Ⅰ-Ⅴ
                .replace(/\uff25\uff38$/, '')             // full-width ＥＸ
                .replace(/\s+(?:EX|[IVX]+)$/i, '')        // half-width EX / I / II / III / IV / V
                .trim();
        }

        function buildGlobalFilterBar() {
            const bar = document.getElementById('globalFilterBar');
            bar.style.display = 'flex';

            // Collect all unique values across all weapons
            const groups = new Set();
            const series = new Set();
            const bonuses = new Set();
            sessionData.weapons.forEach(w => {
                if (w.mode === 'grinding') {
                    w.attempts.forEach(a => (a.bonuses || []).forEach(b => bonuses.add(b)));
                } else {
                    w.attempts.forEach(a => {
                        if (a.skills) {
                            groups.add(a.skills.group);
                            series.add(a.skills.series);
                        }
                    });
                }
            });
            globalFilterAllGroups = [...groups].sort();
            globalFilterAllSeries = [...series].sort();
            globalFilterAllBonuses = [...bonuses].sort();
            globalFilterAllCategories = [...new Set([...bonuses].map(getBonusBaseName))].sort();

            // Label
            document.getElementById('globalFilterLabel').textContent = t('globalFilter');

            // Reset button text
            bar.querySelector('.btn').textContent = t('filterReset');

            // Mode buttons
            const modeContainer = document.getElementById('globalFilterModeButtons');
            const hasLottery = sessionData.weapons.some(w => w.mode === 'lottery');
            const hasGrinding = sessionData.weapons.some(w => w.mode === 'grinding');

            let modeHtml = '';
            if (hasLottery) {
                modeHtml += `<button class="gf-mode-btn${globalFilterMode === 'lottery' ? ' active' : ''}" onclick="setGlobalFilterMode('lottery')">${t('pickupLottery')}</button>`;
            }
            if (hasGrinding) {
                modeHtml += `<button class="gf-mode-btn${globalFilterMode === 'grinding' ? ' active' : ''}" onclick="setGlobalFilterMode('grinding')">${t('pickupGrinding')}</button>`;
            }
            modeContainer.innerHTML = modeHtml;

            // Render controls for current mode
            renderGlobalFilterControls();
        }

        function setGlobalFilterMode(mode) {
            if (globalFilterMode === mode) {
                // Toggle off
                globalFilterMode = null;
            } else {
                globalFilterMode = mode;
            }

            // Update button states
            document.querySelectorAll('#globalFilterModeButtons .gf-mode-btn').forEach(btn => {
                const btnMode = btn.textContent === t('pickupLottery') ? 'lottery' : 'grinding';
                btn.classList.toggle('active', btnMode === globalFilterMode);
            });

            renderGlobalFilterControls();
            // Reset filter when switching mode
            resetGlobalFilter();
        }

        function renderGlobalFilterControls() {
            const container = document.getElementById('globalFilterControls');

            if (!globalFilterMode) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            if (globalFilterMode === 'lottery') {
                html += `
                    <div class="gf-group">
                        <label>${t('groupSkill')}</label>
                        <select data-gf-type="group" onchange="applyGlobalFilter()">
                            <option value="">${t('filterAll')}</option>
                            ${globalFilterAllGroups.map(s => `<option value="${escAttr(s)}">${escHtml(s)}</option>`).join('')}
                        </select>
                    </div>
                    <div class="gf-group">
                        <label>${t('seriesSkill')}</label>
                        <select data-gf-type="series" onchange="applyGlobalFilter()">
                            <option value="">${t('filterAll')}</option>
                            ${globalFilterAllSeries.map(s => `<option value="${escAttr(s)}">${escHtml(s)}</option>`).join('')}
                        </select>
                    </div>`;
            } else {
                // Grinding: 5 dropdowns with Category + Exact optgroups
                for (let i = 0; i < 5; i++) {
                    html += `
                    <div class="gf-group">
                        <label>${t('globalFilterBonus')} ${i + 1}</label>
                        <select data-gf-type="bonus" data-gf-idx="${i}" onchange="applyGlobalFilter()">
                            <option value="">${t('filterAll')}</option>
                            <optgroup label="${t('globalFilterCategory')}">
                                ${globalFilterAllCategories.map(c => `<option value="cat:${escAttr(c)}">${escHtml(c)}</option>`).join('')}
                            </optgroup>
                            <optgroup label="${t('globalFilterExact')}">
                                ${globalFilterAllBonuses.map(b => `<option value="${escAttr(b)}">${escHtml(b)}</option>`).join('')}
                            </optgroup>
                        </select>
                    </div>`;
                }
            }
            container.innerHTML = html;
        }

        function applyGlobalFilter() {
            if (!globalFilterMode) return;

            sessionData.weapons.forEach((w, wIdx) => {
                // Only filter panels matching the selected mode
                if (w.mode !== globalFilterMode) return;

                const tbody = document.getElementById(`tbody-${wIdx}`);
                if (!tbody) return;

                if (globalFilterMode === 'lottery') {
                    const groupVal = document.querySelector('select[data-gf-type="group"]')?.value || '';
                    const seriesVal = document.querySelector('select[data-gf-type="series"]')?.value || '';

                    tbody.querySelectorAll('tr').forEach(tr => {
                        const matchG = !groupVal || tr.dataset.group === groupVal;
                        const matchS = !seriesVal || tr.dataset.series === seriesVal;
                        tr.style.display = (matchG && matchS) ? '' : 'none';
                    });
                } else {
                    // Grinding: AND condition on selected bonuses (category or exact)
                    const bonusSelects = document.querySelectorAll('select[data-gf-type="bonus"]');
                    const rawValues = [...bonusSelects].map(s => s.value).filter(v => v);

                    // Separate category ("cat:xxx") and exact values, count occurrences
                    const catCounts = {};
                    const exactCounts = {};
                    rawValues.forEach(v => {
                        if (v.startsWith('cat:')) {
                            const base = v.slice(4);
                            catCounts[base] = (catCounts[base] || 0) + 1;
                        } else {
                            exactCounts[v] = (exactCounts[v] || 0) + 1;
                        }
                    });

                    tbody.querySelectorAll('tr').forEach(tr => {
                        if (rawValues.length === 0) {
                            tr.style.display = '';
                            return;
                        }
                        // Work with a consumable pool of row bonuses
                        const pool = (tr.dataset.bonuses || '').split('|').slice();

                        // 1) Consume exact matches first
                        let matchExact = true;
                        for (const [b, cnt] of Object.entries(exactCounts)) {
                            let found = 0;
                            for (let i = 0; i < pool.length && found < cnt; i++) {
                                if (pool[i] === b) { pool.splice(i, 1); i--; found++; }
                            }
                            if (found < cnt) { matchExact = false; break; }
                        }

                        // 2) Check category matches against remaining pool
                        let matchCat = true;
                        if (matchExact) {
                            const remainCatCounts = {};
                            pool.forEach(b => {
                                const base = getBonusBaseName(b);
                                remainCatCounts[base] = (remainCatCounts[base] || 0) + 1;
                            });
                            matchCat = Object.entries(catCounts).every(([b, cnt]) => (remainCatCounts[b] || 0) >= cnt);
                        }

                        tr.style.display = (matchExact && matchCat) ? '' : 'none';
                    });
                }

                updateStats(wIdx);
            });
        }


        function resetGlobalFilter() {
            // Reset all global filter selects
            document.querySelectorAll('#globalFilterControls select').forEach(sel => sel.value = '');

            // Show all rows in panels matching the current global mode
            if (globalFilterMode) {
                sessionData.weapons.forEach((w, wIdx) => {
                    if (w.mode !== globalFilterMode) return;
                    const tbody = document.getElementById(`tbody-${wIdx}`);
                    if (!tbody) return;
                    tbody.querySelectorAll('tr').forEach(tr => tr.style.display = '');
                    updateStats(wIdx);
                });
            }
        }

        // ── Pickup System ──
        let pickupMode = false;
        let pickupModeType = null; // 'lottery' or 'grinding'
        let pickedAttempts = [];   // [{wIdx, attemptNum, nickname, detail}, ...]
        let usedAttemptNums = new Set();

        function showPickupModal() {
            // If picks exist, re-open directly without modal
            if (pickedAttempts.length > 0 && pickupModeType) {
                enterPickupMode(pickupModeType);
                return;
            }
            document.getElementById('pickupModalOverlay').classList.add('active');
        }

        function hidePickupModal() {
            document.getElementById('pickupModalOverlay').classList.remove('active');
        }

        function enterPickupMode(modeType) {
            hidePickupModal();
            pickupMode = true;

            // Only reset data when switching to a different mode
            if (pickupModeType !== modeType) {
                pickupModeType = modeType;
                pickedAttempts = [];
                usedAttemptNums.clear();
            }

            // Clear existing highlights
            clearAllHighlights();

            // UI state
            document.body.classList.add('pickup-active', 'pickup-panel-open');
            document.getElementById('pickupPanel').classList.add('open');
            document.getElementById('pickupBtn').style.display = 'none';
            document.getElementById('exitPickupBtn').style.display = '';
            document.getElementById('clearHighlights').style.display = 'none';

            // Update panel title
            const modeLabel = modeType === 'lottery' ? t('pickupLottery') : t('pickupGrinding');
            document.getElementById('pickupPanelTitle').textContent = `${t('pickupTitle')} (${modeLabel})`;

            // Dim non-matching mode tabs
            document.querySelectorAll('.tab').forEach((tab, i) => {
                const w = sessionData.weapons[i];
                tab.classList.toggle('pickup-dimmed', w.mode !== modeType);
            });

            renderPickupPanel();
            applyPickupRowStates();
        }

        function exitPickupMode() {
            pickupMode = false;
            // Keep pickupModeType, pickedAttempts, usedAttemptNums intact

            document.body.classList.remove('pickup-active', 'pickup-panel-open');
            document.getElementById('pickupPanel').classList.remove('open');
            document.getElementById('pickupBtn').style.display = 'flex';
            document.getElementById('exitPickupBtn').style.display = 'none';
            document.getElementById('clearHighlights').style.display = '';

            // Remove dimming from tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('pickup-dimmed');
            });

            // Remove row states
            document.querySelectorAll('tbody tr').forEach(tr => {
                tr.classList.remove('row-picked', 'row-conflict');
            });
        }

        function onRowClick(tr) {
            if (!pickupMode) return;
            const wIdx = parseInt(tr.dataset.widx);
            const attemptNum = parseInt(tr.dataset.attempt);
            const weapon = sessionData.weapons[wIdx];

            // Only allow picking from matching mode
            if (weapon.mode !== pickupModeType) return;

            // Check if this row is already picked
            const existingIdx = pickedAttempts.findIndex(p => p.wIdx === wIdx && p.attemptNum === attemptNum);

            if (existingIdx >= 0) {
                // Unpick
                pickedAttempts.splice(existingIdx, 1);
                rebuildUsedAttemptNums();
            } else {
                // Check conflict
                if (usedAttemptNums.has(attemptNum)) return;

                // Build detail string
                const attempt = weapon.attempts.find(a => a.attemptNum === attemptNum);
                let detail = '';
                if (attempt) {
                    if (weapon.mode === 'lottery' && attempt.skills) {
                        detail = `${attempt.skills.group} / ${attempt.skills.series}`;
                    } else if (weapon.mode === 'grinding' && attempt.bonuses) {
                        detail = attempt.bonuses.join(', ');
                    }
                }

                pickedAttempts.push({
                    wIdx,
                    attemptNum,
                    nickname: weapon.nickname || `${weapon.weaponTypeName} ${weapon.attribute}`,
                    detail
                });
                usedAttemptNums.add(attemptNum);
            }

            // Sort by attemptNum
            pickedAttempts.sort((a, b) => a.attemptNum - b.attemptNum);

            renderPickupPanel();
            applyPickupRowStates();
            updatePickupBadge();
        }

        function rebuildUsedAttemptNums() {
            usedAttemptNums.clear();
            pickedAttempts.forEach(p => usedAttemptNums.add(p.attemptNum));
        }

        function clearAllPicks() {
            if (pickedAttempts.length > 0 && !confirm(t('pickupClearConfirm'))) return;

            pickedAttempts = [];
            usedAttemptNums.clear();
            pickupModeType = null;
            renderPickupPanel();
            applyPickupRowStates();
            updatePickupBadge();
            exitPickupMode();
        }

        function removePickedItem(wIdx, attemptNum) {
            const idx = pickedAttempts.findIndex(p => p.wIdx === wIdx && p.attemptNum === attemptNum);
            if (idx < 0) return;
            pickedAttempts.splice(idx, 1);
            rebuildUsedAttemptNums();
            renderPickupPanel();
            applyPickupRowStates();
            updatePickupBadge();
        }

        function updatePickupBadge() {
            const badge = document.getElementById('pickupBadge');
            if (!badge) return;
            if (pickedAttempts.length > 0) {
                badge.textContent = pickedAttempts.length;
                badge.classList.add('visible');
            } else {
                badge.classList.remove('visible');
            }
        }

        function applyPickupRowStates() {
            if (!pickupMode) return;

            // Build a set of picked keys: "wIdx-attemptNum"
            const pickedKeys = new Set(pickedAttempts.map(p => `${p.wIdx}-${p.attemptNum}`));

            document.querySelectorAll('tbody tr[data-attempt]').forEach(tr => {
                const wIdx = parseInt(tr.dataset.widx);
                const attemptNum = parseInt(tr.dataset.attempt);
                const weapon = sessionData.weapons[wIdx];
                const key = `${wIdx}-${attemptNum}`;

                tr.classList.remove('row-picked', 'row-conflict');

                if (weapon.mode !== pickupModeType) return;

                if (pickedKeys.has(key)) {
                    tr.classList.add('row-picked');
                } else if (usedAttemptNums.has(attemptNum)) {
                    tr.classList.add('row-conflict');
                }
            });
        }

        function renderPickupPanel() {
            const body = document.getElementById('pickupPanelBody');
            const footer = document.getElementById('pickupPanelFooter');

            if (pickedAttempts.length === 0) {
                body.innerHTML = `<div class="pickup-empty">${t('pickupEmpty')}</div>`;
                footer.innerHTML = '';
                return;
            }

            body.innerHTML = pickedAttempts.map(p => `
                <div class="pickup-entry" onclick="jumpToRow(${p.wIdx}, ${p.attemptNum})">
                    <div class="pickup-entry-header">
                        <span class="pickup-entry-num">#${p.attemptNum}</span>
                        <span class="pickup-entry-nickname">\u2192 ${escHtml(p.nickname)}</span>
                        <button class="pickup-entry-remove" onclick="event.stopPropagation(); removePickedItem(${p.wIdx}, ${p.attemptNum})" title="Remove">✕</button>
                    </div>
                    <div class="pickup-entry-detail">${escHtml(p.detail)}</div>
                </div>
            `).join('');

            const maxAttempt = Math.max(...pickedAttempts.map(p => p.attemptNum));
            footer.innerHTML = `
                <span>${t('pickupTotal')}: <span class="stat-value">${pickedAttempts.length}</span></span>
                <span>${t('pickupConsumed')}: <span class="stat-value">${maxAttempt}</span></span>
            `;
        }

        function jumpToRow(wIdx, attemptNum) {
            // Switch to the tab
            switchTab(wIdx);

            // Scroll to the row
            setTimeout(() => {
                const row = document.querySelector(`#tbody-${wIdx} tr[data-attempt="${attemptNum}"]`);
                if (row) {
                    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // Brief flash effect
                    row.style.outline = '2px solid var(--accent-hover)';
                    setTimeout(() => { row.style.outline = ''; }, 1500);
                }
            }, 100);
        }
    </script>

</body>
